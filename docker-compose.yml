services:
  registration:
    build: .
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DB_PATH: "/data/registration.db"
      REGISTRATION_MODE: "${REGISTRATION_MODE:-open}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?ADMIN_TOKEN is required}"
      OC_URL: "${OC_URL:?OC_URL is required}"
      OC_ADMIN_USER: "${OC_ADMIN_USER:-admin}"
      OC_ADMIN_PASSWORD: "${OC_ADMIN_PASSWORD:?OC_ADMIN_PASSWORD is required}"
      OC_INSECURE: "${OC_INSECURE:-false}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:8080}"
    volumes:
      - registration-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  registration-data:
